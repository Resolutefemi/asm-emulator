name: "Build and Release"

# Triggered either:
#   1. By pushing a tag matching `app-v*` (e.g. `git tag app-v0.1.0 && git push --tags`)
#   2. Manually from the Actions tab ("Run workflow") — optionally override the version
on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.2.0). Leave empty to read from src-tauri/tauri.conf.json"
        required: false
        default: ""

# All jobs need to create/upload to releases
permissions:
  contents: write

# Don't cancel an in-flight release when a new tag is pushed
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # prepare: compute the release tag once and share it with all builders.
  # This avoids the race where each matrix job invents its own tag.
  # ─────────────────────────────────────────────────────────────────────
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          # Read version from tauri.conf.json
          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          # Manual trigger can override the version
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          # If triggered by a tag push app-v*, use that tag name verbatim.
          # Otherwise (workflow_dispatch), synthesize `app-v<version>`.
          if [ "${{ github.ref_type }}" = "tag" ]; then
            TAG="${{ github.ref_name }}"
          else
            TAG="app-v${VERSION}"
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}"        >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"
          echo "Resolved tag:     ${TAG}"

  # ─────────────────────────────────────────────────────────────────────
  # Desktop builds: Windows (Lite + Full), macOS (universal binary), Linux (x64)
  # ─────────────────────────────────────────────────────────────────────
  build-desktop:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Intel + Apple Silicon in one .app/.dmg)
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"
            windows_variant: "none"

          # Linux x86_64 — AppImage + .deb
          - platform: "ubuntu-22.04"
            args: ""
            rust_targets: ""
            windows_variant: "none"

          # Windows x86_64 LITE — small (~9 MB) NSIS .exe that downloads
          # WebView2 only if missing. Best for the ~90% of users on modern
          # Windows 10/11 with internet at install time.
          - platform: "windows-latest"
            args: ""
            rust_targets: ""
            windows_variant: "lite"

          # Windows x86_64 FULL — large (~200 MB) MSI that bundles the full
          # WebView2 runtime for offline install. For the ~10% of users on
          # restricted networks, corporate machines, or without internet.
          - platform: "windows-latest"
            args: ""
            rust_targets: ""
            windows_variant: "full"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      # Speed up rebuilds by caching ~/.cargo and target/
      # The cache key includes windows_variant so Lite and Full don't
      # corrupt each other's build artifacts.
      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"
          key: ${{ matrix.windows_variant }}

      # Tauri v2 requires WebKit2GTK 4.1 (NOT 4.0 — that's Tauri v1)
      - name: Install Linux Build Dependencies (Tauri v2 / WebKit2GTK 4.1)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      # ─── Windows variant config ─────────────────────────────────────
      # Tauri v2 only allows ONE webviewInstallMode per build. To produce
      # both Lite and Full Windows installers, we patch tauri.conf.json
      # per matrix job before building.
      #
      # Lite: downloadBootstrapper — 9 MB .exe that downloads WebView2
      #       at install time ONLY if not already present.
      # Full: offlineInstaller — 200 MB .msi that bundles the full
      #       WebView2 runtime so install works with zero network.
      - name: Configure Windows Lite variant (downloadBootstrapper)
        if: matrix.platform == 'windows-latest' && matrix.windows_variant == 'lite'
        run: |
          python3 - <<'PY'
          import json
          with open('src-tauri/tauri.conf.json') as f:
              conf = json.load(f)
          conf['bundle']['windows']['webviewInstallMode'] = {
              'type': 'downloadBootstrapper',
              'silent': True,
          }
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Configured Windows LITE variant (downloadBootstrapper)')
          PY

      - name: Configure Windows Full variant (offlineInstaller)
        if: matrix.platform == 'windows-latest' && matrix.windows_variant == 'full'
        run: |
          python3 - <<'PY'
          import json
          with open('src-tauri/tauri.conf.json') as f:
              conf = json.load(f)
          conf['bundle']['windows']['webviewInstallMode'] = {
              'type': 'offlineInstaller',
              'silent': True,
          }
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(conf, f, indent=2)
          print('Configured Windows FULL variant (offlineInstaller)')
          PY

      - name: Install Frontend Dependencies
        run: npm ci

      # tauri-action builds the app. We DON'T upload to the release from
      # here — instead, we rename the artifacts (to disambiguate Lite vs
      # Full Windows builds) and upload them with a separate step below.
      #
      # Why: Tauri names both Lite and Full Windows outputs identically
      # (RenASM_0.2.x_x64_en-US.msi / RenASM_0.2.x_x64-setup.exe) since
      # they share the same productName + version. If both jobs uploaded
      # to the same release, the second upload would overwrite the first.
      # So we suffix "-lite" or "-full" before uploading.
      - name: Build (Tauri Action — no upload)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LD_LIBRARY_PATH: ""
          DYLD_FALLBACK_LIBRARY_PATH: ""
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: "RenASM v${{ needs.prepare.outputs.version }}"
          releaseDraft: true
          prerelease: false
          # Crucial: don't upload from tauri-action. We'll upload manually
          # after renaming to avoid Lite/Full name collisions.
          args: ${{ matrix.args }}

      # Rename Windows artifacts to disambiguate Lite vs Full.
      # Tauri's bundle output dir is src-tauri/target/release/bundle/{msi,nsis}/
      - name: Rename Windows artifacts (Lite suffix)
        if: matrix.platform == 'windows-latest' && matrix.windows_variant == 'lite'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          # Rename .msi -> .msi (Lite)
          Get-ChildItem -Path "$bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '\.msi$', '-lite.msi'
            Rename-Item $_.FullName -NewName $newName
            Write-Host "Renamed: $($_.Name) -> $newName"
          }
          # Rename NSIS .exe -> -lite-setup.exe
          Get-ChildItem -Path "$bundle/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '-setup\.exe$', '-lite-setup.exe'
            Rename-Item $_.FullName -NewName $newName
            Write-Host "Renamed: $($_.Name) -> $newName"
          }
          # List final
          Write-Host "`n=== Final Windows LITE artifacts ==="
          Get-ChildItem -Path "$bundle/msi","$bundle/nsis" -Recurse -Filter "*.msi","*-setup.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.FullName)  ($($_.Length) bytes)"
          }

      - name: Rename Windows artifacts (Full suffix)
        if: matrix.platform == 'windows-latest' && matrix.windows_variant == 'full'
        shell: pwsh
        run: |
          $bundle = "src-tauri/target/release/bundle"
          # Rename .msi -> -full.msi
          Get-ChildItem -Path "$bundle/msi" -Filter "*.msi" -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '\.msi$', '-full.msi'
            Rename-Item $_.FullName -NewName $newName
            Write-Host "Renamed: $($_.Name) -> $newName"
          }
          # Rename NSIS .exe -> -full-setup.exe
          Get-ChildItem -Path "$bundle/nsis" -Filter "*-setup.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            $newName = $_.Name -replace '-setup\.exe$', '-full-setup.exe'
            Rename-Item $_.FullName -NewName $newName
            Write-Host "Renamed: $($_.Name) -> $newName"
          }
          Write-Host "`n=== Final Windows FULL artifacts ==="
          Get-ChildItem -Path "$bundle/msi","$bundle/nsis" -Recurse -Filter "*.msi","*-setup.exe" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host "  $($_.FullName)  ($($_.Length) bytes)"
          }

      # Upload the (renamed) Windows artifacts + macOS/Linux artifacts.
      # For macOS and Linux, the artifacts are unchanged — only Windows
      # got renamed above. The glob patterns handle both cases.
      - name: Upload artifacts to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "RenASM v${{ needs.prepare.outputs.version }}"
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          body: |
            Automated cross-platform release of **RenASM** (8086 ASM Emulator).

            Pick the asset for your platform:
            - **Windows** — TWO installers to choose from:
              - **Lite** (`*-lite-setup.exe`, ~9 MB) — recommended for most users.
                Downloads WebView2 at install time ONLY if it's missing.
                Works on modern Windows 10/11 with internet access.
              - **Full** (`*-full.msi`, ~200 MB) — for offline/corporate networks.
                Bundles the full WebView2 runtime so install works with zero
                network access.
              - SmartScreen may warn on first launch (unsigned). Click
                "More info" → "Run anyway".
            - **macOS**: `.dmg` (universal — works on Intel + Apple Silicon)
              - Builds are unsigned. Right-click the app → "Open" → "Open anyway"
                on first launch to bypass Gatekeeper.
            - **Linux**: `.AppImage` (portable) or `.deb` (Debian/Ubuntu)
              - For AppImage: `chmod +x RenASM_*.AppImage && ./RenASM_*.AppImage`
            - **Android**: `.apk` (signed, universal — works on arm64/arm/x86/x64)
              - Allow "Install from unknown sources" in Settings if prompted.
          files: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*-setup.exe
            src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/rpm/*.rpm

  # ─────────────────────────────────────────────────────────────────────
  # Android APK build (universal + per-ABI)
  # ─────────────────────────────────────────────────────────────────────
  build-android:
    needs: prepare
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Rust Stable (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      # Java 17 is required by the Android Gradle plugin (AGP 8+)
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Sets up ANDROID_HOME and adds sdkmanager / adb to PATH
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # NDK 27 is what current Tauri v2 expects. (NDK 25 also works if you pin it.)
      - name: Install Android NDK 27
        run: |
          sdkmanager --install "ndk;27.2.12479018"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018" >> "$GITHUB_ENV"
          echo "NDK_HOME=$ANDROID_HOME/ndk/27.2.12479018"        >> "$GITHUB_ENV"

      - name: Install Frontend Dependencies
        run: npm ci

      # The repo only commits a PARTIAL `gen/android/` (icons + manifest,
      # no gradle/Kotlin sources), which makes `tauri android init` refuse
      # to regenerate ("Project directory .../java/com/renasm/playground
      # does not exist"). Deleting the directory first lets init rebuild
      # the full project from scratch on every run.
      - name: Reset partial Android project
        run: rm -rf src-tauri/gen/android

      - name: Init Android Project
        run: npx tauri android init

      # ─── Android signing ────────────────────────────────────────────
      # Android requires APKs to be signed before they can be installed.
      # Without signing, the build produces "app-universal-release-unsigned.apk"
      # and Android refuses to install it with "package appears to be invalid".
      #
      # Two modes:
      #   1. If ANDROID_KEYSTORE_BASE64 secret is set: decode + use the
      #      permanent keystore (recommended — same key across releases,
      #      so app updates don't require uninstall).
      #   2. If not set: generate an ephemeral debug-style keystore for
      #      this build (works, but each release has a different key,
      #      so users must uninstall before updating).
      #
      # To set up a permanent keystore (one-time, takes 1 minute):
      #   keytool -genkey -v -keystore rencode.jks -keyalg RSA -keysize 2048 \\
      #     -validity 10000 -alias rencode
      #   base64 -w0 rencode.jks > keystore.b64
      #   # Then paste keystore.b64 contents into repo secret
      #   # ANDROID_KEYSTORE_BASE64 at https://github.com/Resolutefemi/
      #   # asm-emulator/settings/secrets/actions
      #   # Also set:
      #   #   ANDROID_KEYSTORE_PASSWORD (the -storepass you chose)
      #   #   ANDROID_KEY_ALIAS         (e.g. "rencode")
      #   #   ANDROID_KEY_PASSWORD      (the -keypass you chose)
      - name: Prepare Android signing keystore
        id: keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          KEYSTORE_PATH="$HOME/rencode.jks"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Using permanent keystore from secret"
            echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE_PATH"
            echo "store_password=$ANDROID_KEYSTORE_PASSWORD" >> "$GITHUB_OUTPUT"
            echo "key_alias=$ANDROID_KEY_ALIAS"               >> "$GITHUB_OUTPUT"
            echo "key_password=$ANDROID_KEY_PASSWORD"         >> "$GITHUB_OUTPUT"
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret set — generating ephemeral keystore"
            echo "WARNING: Each release will have a different key. Users must uninstall"
            echo "         the old app before installing a new release."
            keytool -genkey -v \
              -keystore "$KEYSTORE_PATH" \
              -keyalg RSA -keysize 2048 \
              -validity 10000 \
              -alias rencode \
              -storepass rencode123 \
              -keypass rencode123 \
              -dname "CN=RenASM, OU=Dev, O=Renance, L=Lagos, ST=Lagos, C=NG"
            echo "store_password=rencode123" >> "$GITHUB_OUTPUT"
            echo "key_alias=rencode"          >> "$GITHUB_OUTPUT"
            echo "key_password=rencode123"   >> "$GITHUB_OUTPUT"
          fi
          echo "keystore_path=$KEYSTORE_PATH" >> "$GITHUB_OUTPUT"

      # Write a gradle properties file that tells the Android build to sign
      # the release APK with our keystore. Without this, Gradle produces
      # an unsigned APK even with --release.
      - name: Configure Gradle signing
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          STORE_PASSWORD: ${{ steps.keystore.outputs.store_password }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.key_password }}
        run: |
          {
            printf 'storeFile=%s\n' "$KEYSTORE_PATH"
            printf 'storePassword=%s\n' "$STORE_PASSWORD"
            printf 'keyAlias=%s\n' "$KEY_ALIAS"
            printf 'keyPassword=%s\n' "$KEY_PASSWORD"
          } > src-tauri/gen/android/key.properties
          # Patch app/build.gradle.kts to wire up the release signingConfig.
          # The patcher is a committed Python script — embedding Python in
          # a YAML heredoc was fragile (indentation mangles the source).
          python3 scripts/patch-android-signing.py
          echo "=== Patched build.gradle.kts (signing-related lines) ==="
          grep -nE "signingConfig|keystoreProperties|import java" src-tauri/gen/android/app/build.gradle.kts || echo "(no matches — patch may not have applied)"

      - name: Build Android APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
          # See build-desktop for rationale on clearing these.
          LD_LIBRARY_PATH: ""
        run: npx tauri android build --apk

      - name: List built APKs
        run: |
          echo "=== APK files (pre-sign) ==="
          find src-tauri/gen/android -name "*.apk" -print

      # The Gradle signing config above SHOULD produce a signed APK.
      # But if the key.properties injection failed silently, we'll still
      # get an unsigned APK. This step catches that and signs manually
      # with apksigner as a fallback.
      - name: Fallback — sign APK if still unsigned
        env:
          KEYSTORE_PATH: ${{ steps.keystore.outputs.keystore_path }}
          STORE_PASSWORD: ${{ steps.keystore.outputs.store_password }}
          KEY_ALIAS: ${{ steps.keystore.outputs.key_alias }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.key_password }}
        run: |
          UNSIGNED=$(find src-tauri/gen/android -name "*-unsigned.apk" | head -1)
          if [ -n "$UNSIGNED" ]; then
            echo "Found unsigned APK: $UNSIGNED"
            echo "Signing with apksigner (fallback)..."
            SIGNED="${UNSIGNED%-unsigned.apk}.apk"
            # Zip-align first (required before signing with v2+)
            BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
            "${BUILD_TOOLS}zipalign" -p -f -v 4 "$UNSIGNED" "$SIGNED"
            "${BUILD_TOOLS}apksigner" sign \
              --ks "$KEYSTORE_PATH" \
              --ks-pass "pass:$STORE_PASSWORD" \
              --ks-key-alias "$KEY_ALIAS" \
              --key-pass "pass:$KEY_PASSWORD" \
              --out "$SIGNED" \
              "$UNSIGNED"
            "${BUILD_TOOLS}apksigner" verify --verbose "$SIGNED"
            # Remove the unsigned version
            rm -f "$UNSIGNED"
            echo "Signed APK: $SIGNED"
          else
            echo "No unsigned APK found — Gradle signing worked."
          fi

      - name: List final APKs
        run: |
          echo "=== APK files (final) ==="
          find src-tauri/gen/android -name "*.apk" -print

      # Append APKs to the SAME draft release created by the desktop job.
      # softprops/action-gh-release@v2 will create the release if it doesn't
      # exist yet, or append files if it does.
      - name: Upload APKs to Release Draft
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: "RenASM v${{ needs.prepare.outputs.version }}"
          draft: true
          prerelease: false
          fail_on_unmatched_files: false
          files: |
            src-tauri/gen/android/app/build/outputs/apk/**/*.apk
            src-tauri/gen/android/**/*.apk
