name: "Build and Release"

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # Desktop builds: Windows, macOS, Linux
  # ─────────────────────────────────────────────
  build-desktop:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS universal binary (Intel + Apple Silicon)
          - platform: "macos-latest"
            args: "--target universal-apple-darwin"
            rust_targets: "aarch64-apple-darwin,x86_64-apple-darwin"

          # Linux x86_64
          - platform: "ubuntu-22.04"
            args: ""
            rust_targets: ""

          # Windows x86_64
          - platform: "windows-latest"
            args: ""
            rust_targets: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install Rust stable with optional extra targets (needed for macOS universal & Android)
      - name: Install Rust Stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets || '' }}

      # Clear any stray Windows paths that confuse Linux/macOS linkers
      - name: Unset Windows cargo target dir (if present)
        run: |
          unset CARGO_TARGET_DIR || true

      # Install Linux system dependencies (Tauri v1 / WebKit2GTK 4.0)
      - name: Install Linux Build Dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.0-dev \
            build-essential \
            curl \
            wget \
            file \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install Frontend Dependencies
        run: npm ci

      # Build and Release (Tauri Action)
      - name: Build and Release (Tauri Action)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "RenASM v__VERSION__"
          releaseBody: "Automated release of RenASM cross-platform builds."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

  # ─────────────────────────────────────────────
  # Android APK build
  # ─────────────────────────────────────────────
  build-android:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Rust with all Android targets
      - name: Install Rust Stable (Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      # Java 17 is required by the Android Gradle toolchain
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "17"

      # Sets up ANDROID_HOME and adds sdkmanager / adb to PATH
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Install the NDK version Tauri Android requires
      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;25.2.9519653"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

      - name: Install Frontend Dependencies
        run: npm ci

      # Initialize the Android project if gen/android doesn't exist yet
      - name: Init Android Project (if needed)
        run: |
          if [ ! -d "src-tauri/gen/android" ]; then
            npx tauri android init
          fi

      - name: Build Android APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_NDK_HOME }}
          NDK_HOME: ${{ env.NDK_HOME }}
        run: npx tauri android build --apk

      # Gather all APKs regardless of variant name
      - name: Find APK files
        id: find_apk
        run: |
          APK_FILES=$(find src-tauri/gen/android -name "*.apk" | tr '\n' '\n')
          echo "Found APKs:"
          echo "$APK_FILES"

      - name: Upload APK to Release Draft
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: app-v${{ github.ref_name != '' && github.ref_name || '0.1.0' }}
          name: "RenASM"
          draft: true
          files: src-tauri/gen/android/**/*.apk
